<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLE 手账</title>
    <style>
      :root {
        --ink: #22312b;
        --ink-soft: #5a6964;
        --ink-mute: #9aa8a2;
        --sage: #3e8c70;
        --coral: #e69076;
        --cream: #fbf8f2;
        --paper: #ffffff;
        --line: #e8eae4;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--cream);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Noto Sans SC', 'PingFang SC',
          'Microsoft YaHei', sans-serif;
        font-size: 15px;
        line-height: 1.7;
        -webkit-text-size-adjust: 100%;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px 80px;
        text-align: center;
      }
      h1 {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      p {
        margin-bottom: 24px;
      }
      a.button {
        display: inline-block;
        margin: 12px;
        padding: 14px 24px;
        background: var(--sage);
        color: #fff;
        font-weight: 600;
        border-radius: 8px;
        text-decoration: none;
        transition: background 0.3s;
      }
      a.button:hover {
        background: var(--coral);
      }
      footer {
        margin-top: 48px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
        color: var(--ink-mute);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>SLE 手账</h1>
      <p>欢迎使用 SLE 手账 App，您可以在这里查看隐私政策和服务条款。</p>
      <a href="privacy.html" class="button">查看隐私政策</a>
      <a href="terms.html" class="button">查看服务条款</a>

      <footer>
        SLE 手账 App · 由 Craft with love 二人团队维护 · 非诊断、非医疗器械
      </footer>
    </div>
  </body>
</html>
